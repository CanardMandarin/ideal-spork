name: 🚀 Program Upgrade Intent
description: Submit an intent to upgrade a on-chain program.
title: "[Upgrade] <Program> — <Short reason>"

body:

  - type: dropdown
    id: project
    attributes:
      label: Project
      description: Which project does this upgrade apply to?
      options:
        - Jupiter Perps
        - Jupiter Lend
        - Offerbook
    validations:
      required: true

  - type: input
    id: program_id
    attributes:
      label: Program ID
      description: The on-chain Solana program ID being upgraded.
      placeholder: "e.g. JUP6LkbZbjS1jKKwapdHNy74zcZ3tLUZoi5QNyVTaV4"
    validations:
      required: true

  - type: dropdown
    id: upgrade_reason
    attributes:
      label: Upgrade Reason
      description: What is the primary reason for this upgrade?
      options:
        - Bug fix
        - Security fix
        - New feature
        - Other
    validations:
      required: true

  - type: input
    id: build_hash
    attributes:
      label: Verifiable Build Hash
      description: The SHA-256 hash of the verifiable build artifact.
      placeholder: "e.g. a3f1c2d4e5b67890abcdef1234567890abcdef1234567890abcdef1234567890"
    validations:
      required: true

  - type: input
    id: commit_id
    attributes:
      label: Commit ID / Branch
      description: The git commit hash or branch name associated with this build.
      placeholder: "e.g. a1b2c3d or feat/upgrade-v2"
    validations:
      required: true

  - type: textarea
    id: audit_reports
    attributes:
      label: Audit Reports
      description: >
        Attach audit report files by **dragging and dropping them into this box**,
        or paste links to publicly available audit reports below.
        Supported formats: PDF, MD, TXT.
      placeholder: |
        <!-- Drag & drop audit report files here -->
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary of Changes
      description: >
        Provide an explanation of what changed and why this upgrade is necessary.
      placeholder: |
        **What changed:**
    validations:
      required: true
