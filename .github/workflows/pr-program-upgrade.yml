name: Program Upgrade Form Validation

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR Form
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";

            function extract(field) {
              const regex = new RegExp(`\\*\\*${field}:\\*\\*\\s*([\\s\\S]*?)(\\n\\n|$)`, "i");
              const match = body.match(regex);
              return match ? match[1].trim() : "";
            }

            const fields = {
              repo: extract("GitHub Repo"),
              programId: extract("Program ID"),
              buildHash: extract("Verifiable Build Hash"),
              commitId: extract("Commit ID"),
              audit: extract("Audit Report"),
              submittedBy: extract("Submitted by"),
              date: extract("Date")
            };

            const summaryMatch = body.match(/### Summary of Changes\s*([\s\S]*?)\n---/i);
            const summary = summaryMatch ? summaryMatch[1].trim() : "";

            const errors = [];

            // Required checks
            for (const [key, value] of Object.entries(fields)) {
              if (!value || value.includes("<!--")) {
                errors.push(`${key} is missing`);
              }
            }

            if (!summary || summary.length < 10) {
              errors.push("Summary of Changes is too short");
            }

            // Format checks
            if (fields.repo && !fields.repo.includes("github.com")) {
              errors.push("GitHub Repo must be a valid GitHub URL");
            }

            if (fields.commitId && !/^[a-f0-9]{7,40}$/i.test(fields.commitId)) {
              errors.push("Commit ID must be a valid git hash");
            }

            if (fields.date && !/^\d{4}-\d{2}-\d{2}$/.test(fields.date)) {
              errors.push("Date must be YYYY-MM-DD");
            }

            if (errors.length > 0) {
              const message = `
🚨 **Program Upgrade Form Invalid**

The following issues were found:

${errors.map(e => `- ${e}`).join("\n")}

---

### ✅ Expected Format

🚀 Program Upgrade Intent  
━━━━━━━━━━━━━━━━━━━━━━━━  
GitHub Repo: https://github.com/org/repo  
Program ID: <program-id>  
Verifiable Build Hash: <build-hash>  
Commit ID: <commit-id>  
Audit Report: <link>  
━━━━━━━━━━━━━━━━━━━━━━━━  

Summary of Changes:  
<clear explanation>

Submitted by: <name>  
Date: YYYY-MM-DD  

---

Please edit your PR description.
`;

              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body: message
              });

              core.setFailed("Invalid PR form");
            }
