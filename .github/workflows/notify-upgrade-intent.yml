name: Notify Slack on Program Upgrade Intent

on:
  issues:
    types: [opened]

jobs:
  notify-slack:
    name: Send Slack Notification
    runs-on: ubuntu-latest
    # Only run for issues that match the upgrade intent template
    if: contains(github.event.issue.title, '[Upgrade]')

    env:
      SLACK_REVIEW_GROUP_HANDLE: security-upgrade-intent
      SLACK_REVIEW_GROUP_ID: S0ASA3CND9V

    steps:
      - name: Parse Issue Body
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';

            const extract = (label) => {
              // Matches "### Label\n\nvalue" blocks produced by GitHub issue forms
              const regex = new RegExp(
                `###\\s*${label}\\s*\\n+([\\s\\S]*?)(?=\\n###|$)`,
                'i'
              );
              const match = body.match(regex);
              return match ? match[1].trim() : '_Not provided_';
            };

            const project      = extract('Project');
            const programId    = extract('Program ID');
            const upgradeReason = extract('Upgrade Reason');
            const buildHash    = extract('Verifiable Build Hash');
            const commitId     = extract('Commit ID \\/ Branch');
            const summary      = extract('Summary of Changes');

            core.setOutput('project',       project);
            core.setOutput('program_id',    programId);
            core.setOutput('upgrade_reason', upgradeReason);
            core.setOutput('build_hash',    buildHash);
            core.setOutput('commit_id',     commitId);
            core.setOutput('summary',       summary);

      - name: Send Slack Message
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          ISSUE_URL="${{ github.event.issue.html_url }}"
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          AUTHOR="${{ github.event.issue.user.login }}"
          AUTHOR_URL="https://github.com/${{ github.event.issue.user.login }}"
          REPO="${{ github.repository }}"

          PROJECT="${{ steps.parse.outputs.project }}"
          PROGRAM_ID="${{ steps.parse.outputs.program_id }}"
          UPGRADE_REASON="${{ steps.parse.outputs.upgrade_reason }}"
          BUILD_HASH="${{ steps.parse.outputs.build_hash }}"
          COMMIT_ID="${{ steps.parse.outputs.commit_id }}"
          SUMMARY="${{ steps.parse.outputs.summary }}"

          # Truncate summary to avoid Slack block limits (3000 chars)
          SUMMARY_TRIMMED="${SUMMARY:0:500}"
          if [ ${#SUMMARY} -gt 500 ]; then
            SUMMARY_TRIMMED="${SUMMARY_TRIMMED}…"
          fi

          # Use jq to safely build JSON — this handles escaping of all special
          # characters in user-supplied strings (angle brackets, dashes, quotes, etc.)
          PAYLOAD=$(jq -n \
            --arg group_id    "$SLACK_REVIEW_GROUP_ID" \
            --arg group_handle "$SLACK_REVIEW_GROUP_HANDLE" \
            --arg issue_url   "$ISSUE_URL" \
            --arg issue_num   "#${ISSUE_NUMBER}" \
            --arg issue_title "$ISSUE_TITLE" \
            --arg author      "@${AUTHOR}" \
            --arg author_url  "$AUTHOR_URL" \
            --arg project     "$PROJECT" \
            --arg reason      "$UPGRADE_REASON" \
            --arg commit      "$COMMIT_ID" \
            --arg program_id  "$PROGRAM_ID" \
            --arg build_hash  "$BUILD_HASH" \
            --arg summary     "$SUMMARY_TRIMMED" \
            '{
              text: ("<!subteam^" + $group_id + "|" + $group_handle + "> — New Program Upgrade Intent submitted: <" + $issue_url + "|" + $issue_num + " " + $issue_title + ">"),
              blocks: [
                {
                  type: "header",
                  text: { type: "plain_text", text: "🚀 New Program Upgrade Intent", emoji: true }
                },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: ("<!subteam^" + $group_id + "|" + $group_handle + "> — a new upgrade intent has been submitted and requires your review.")
                  }
                },
                { type: "divider" },
                {
                  type: "section",
                  fields: [
                    { type: "mrkdwn", text: ("*Issue*\n<" + $issue_url + "|" + $issue_num + " — " + $issue_title + ">") },
                    { type: "mrkdwn", text: ("*Submitted by*\n<" + $author_url + "|" + $author + ">") },
                    { type: "mrkdwn", text: ("*Project*\n" + $project) },
                    { type: "mrkdwn", text: ("*Upgrade Reason*\n" + $reason) },
                    { type: "mrkdwn", text: ("*Commit / Branch*\n`" + $commit + "`") }
                  ]
                },
                {
                  type: "section",
                  text: { type: "mrkdwn", text: ("*Program ID*\n`" + $program_id + "`") }
                },
                {
                  type: "section",
                  text: { type: "mrkdwn", text: ("*Build Hash*\n`" + $build_hash + "`") }
                },
                {
                  type: "section",
                  text: { type: "mrkdwn", text: ("*Summary of Changes*\n" + $summary) }
                },
                { type: "divider" },
                {
                  type: "actions",
                  elements: [
                    {
                      type: "button",
                      text: { type: "plain_text", text: "View Issue", emoji: true },
                      style: "primary",
                      url: $issue_url
                    }
                  ]
                }
              ]
            }')

          curl -f -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$SLACK_WEBHOOK_URL"
