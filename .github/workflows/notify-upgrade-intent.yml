name: Notify Slack on Program Upgrade Intent

on:
  issues:
    types: [opened]

jobs:
  notify-slack:
    name: Send Slack Notification
    runs-on: ubuntu-latest
    # Only run for issues that match the upgrade intent template
    if: contains(github.event.issue.title, '[Upgrade]')

    env:
      SLACK_REVIEW_GROUP_HANDLE: security-upgrade-intent
      SLACK_REVIEW_GROUP_ID: S0ASA3CND9V

    steps:
      - name: Parse Issue Body
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';

            const extract = (label) => {
              // Matches "### Label\n\nvalue" blocks produced by GitHub issue forms
              const regex = new RegExp(
                `###\\s*${label}\\s*\\n+([\\s\\S]*?)(?=\\n###|$)`,
                'i'
              );
              const match = body.match(regex);
              return match ? match[1].trim() : '_Not provided_';
            };

            const project      = extract('Project');
            const programId    = extract('Program ID');
            const upgradeReason = extract('Upgrade Reason');
            const buildHash    = extract('Verifiable Build Hash');
            const commitId     = extract('Commit ID \\/ Branch');
            const summary      = extract('Summary of Changes');

            core.setOutput('project',       project);
            core.setOutput('program_id',    programId);
            core.setOutput('upgrade_reason', upgradeReason);
            core.setOutput('build_hash',    buildHash);
            core.setOutput('commit_id',     commitId);
            core.setOutput('summary',       summary);

      - name: Send Slack Message
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          ISSUE_URL="${{ github.event.issue.html_url }}"
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          AUTHOR="${{ github.event.issue.user.login }}"
          AUTHOR_URL="https://github.com/${{ github.event.issue.user.login }}"
          REPO="${{ github.repository }}"

          PROJECT="${{ steps.parse.outputs.project }}"
          PROGRAM_ID="${{ steps.parse.outputs.program_id }}"
          UPGRADE_REASON="${{ steps.parse.outputs.upgrade_reason }}"
          BUILD_HASH="${{ steps.parse.outputs.build_hash }}"
          COMMIT_ID="${{ steps.parse.outputs.commit_id }}"
          SUMMARY="${{ steps.parse.outputs.summary }}"

          # Truncate summary to avoid Slack block limits (3000 chars)
          SUMMARY_TRIMMED="${SUMMARY:0:500}"
          if [ ${#SUMMARY} -gt 500 ]; then
            SUMMARY_TRIMMED="${SUMMARY_TRIMMED}…"
          fi

          PAYLOAD=$(cat <<EOF
          {
            "text": "<!subteam^${SLACK_REVIEW_GROUP_ID}|${SLACK_REVIEW_GROUP_HANDLE}> — New Program Upgrade Intent submitted: <${ISSUE_URL}|#${ISSUE_NUMBER} ${ISSUE_TITLE}>",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🚀 New Program Upgrade Intent",
                  "emoji": true
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "<!subteam^${SLACK_REVIEW_GROUP_ID}|${SLACK_REVIEW_GROUP_HANDLE}> — a new upgrade intent has been submitted and requires your review."
                }
              },
              {
                "type": "divider"
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Issue*\n<${ISSUE_URL}|#${ISSUE_NUMBER} — ${ISSUE_TITLE}>"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Repository*\n<https://github.com/${REPO}|${REPO}>"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Submitted by*\n<${AUTHOR_URL}|@${AUTHOR}>"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Project*\n${PROJECT}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Upgrade Reason*\n${UPGRADE_REASON}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Program ID*\n\`${PROGRAM_ID}\`"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Build Hash*\n\`${BUILD_HASH}\`"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Commit / Branch*\n\`${COMMIT_ID}\`"
                  }
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Summary of Changes*\n${SUMMARY_TRIMMED}"
                }
              },
              {
                "type": "divider"
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "View Issue",
                      "emoji": true
                    },
                    "style": "primary",
                    "url": "${ISSUE_URL}"
                  }
                ]
              }
            ]
          }
          EOF
          )

          curl -f -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$SLACK_WEBHOOK_URL"
