name: Notify Slack — Program Upgrade Intent

on:
  issues:
    types: [opened]
    # Optional: only trigger for this specific template by filtering the title prefix
    # (remove the 'if' below if you want ALL issues to notify)

jobs:
  notify:
    runs-on: ubuntu-latest
    # Only run for issues that match the upgrade intent title prefix
    if: startsWith(github.event.issue.title, '[Upgrade]')

    steps:
      # ── 1. Parse each field from the issue body ───────────────────────────────
      #
      # GitHub issue forms render the body as Markdown like:
      #
      #   ### Project
      #   Jupiter Perps
      #
      #   ### Program ID
      #   JUP6LkbZbjS1jKKwapdHNy74zcZ3tLUZoi5QNyVTaV4
      #
      # The script below extracts the value that follows each "### Field" heading.
      # ─────────────────────────────────────────────────────────────────────────
      - name: Parse issue form fields
        id: fields
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';

            // Generic helper: extract the text block that follows a given heading
            function extract(heading) {
              const regex = new RegExp(
                `###\\s+${heading}\\s*\\n([\\s\\S]*?)(?=\\n###|$)`,
                'i'
              );
              const match = body.match(regex);
              if (!match) return '_Not provided_';
              return match[1].trim().replace(/<!--[\s\S]*?-->/g, '').trim() || '_Not provided_';
            }

            const project      = extract('Project');
            const programId    = extract('Program ID');
            const reason       = extract('Upgrade Reason');
            const buildHash    = extract('Verifiable Build Hash');
            const commitId     = extract('Commit ID / Branch');
            const auditReports = extract('Audit Reports');
            const summary      = extract('Summary of Changes / Reason for Upgrade');

            // Truncate long fields so Slack blocks stay under the 3000-char limit
            const truncate = (str, n = 300) =>
              str.length > n ? str.slice(0, n) + '…' : str;

            core.setOutput('project',       project);
            core.setOutput('program_id',    programId);
            core.setOutput('reason',        reason);
            core.setOutput('build_hash',    truncate(buildHash, 200));
            core.setOutput('commit_id',     commitId);
            core.setOutput('audit_reports', truncate(auditReports, 400));
            core.setOutput('summary',       truncate(summary, 600));

      # ── 2. Send the Slack message ─────────────────────────────────────────────
      #
      # Requires a secret named SLACK_WEBHOOK_URL.
      # Set it under: Settings → Secrets and variables → Actions → New secret
      # ─────────────────────────────────────────────────────────────────────────
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        with:
          payload: |
            {
              "blocks": [

                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚀 Program Upgrade Intent",
                    "emoji": true
                  }
                },

                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<${{ github.event.issue.html_url }}|*#${{ github.event.issue.number }} — ${{ github.event.issue.title }}*>\nOpened by *${{ github.event.issue.user.login }}*"
                  },
                  "accessory": {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "View Issue",
                      "emoji": true
                    },
                    "url": "${{ github.event.issue.html_url }}",
                    "action_id": "view_issue"
                  }
                },

                { "type": "divider" },

                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*📂 Project*\n${{ steps.fields.outputs.project }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*⚙️ Upgrade Reason*\n${{ steps.fields.outputs.reason }}"
                    }
                  ]
                },

                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*🔑 Program ID*\n`${{ steps.fields.outputs.program_id }}`"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*🔀 Commit ID / Branch*\n`${{ steps.fields.outputs.commit_id }}`"
                    }
                  ]
                },

                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*#️⃣ Verifiable Build Hash*\n```${{ steps.fields.outputs.build_hash }}```"
                  }
                },

                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*📎 Audit Reports*\n${{ steps.fields.outputs.audit_reports }}"
                  }
                },

                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*📋 Summary of Changes*\n${{ steps.fields.outputs.summary }}"
                  }
                },

                { "type": "divider" },

                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "📦 Repo: *${{ github.repository }}*  |  🕐 ${{ github.event.issue.created_at }}"
                    }
                  ]
                }

              ]
            }
