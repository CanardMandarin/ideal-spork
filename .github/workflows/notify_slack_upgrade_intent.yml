name: Notify Slack — Program Upgrade Intent

on:
  issues:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: startsWith(github.event.issue.title, '[Upgrade]')

    steps:
      # ── Build the full Slack payload in one place ─────────────────────────────
      #
      # Doing everything here avoids two common pitfalls:
      #   1. GitHub issue bodies use \r\n line endings — normalised below before
      #      running the field regex, which only matches \n.
      #   2. vars.* and mixed-step outputs are not reliably substituted inside
      #      the slackapi action's `payload:` block, so we build the JSON here
      #      and pass the finished string as a single output instead.
      # ─────────────────────────────────────────────────────────────────────────
      - name: Build Slack payload
        id: payload
        uses: actions/github-script@v7
        env:
          SLACK_REVIEW_GROUP_ID: ${{ vars.SLACK_REVIEW_GROUP_ID }}
        with:
          script: |
            // ── 1. Normalise line endings (\r\n → \n) ──────────────────────────
            const body = (context.payload.issue.body || '').replace(/\r\n/g, '\n');

            // ── 2. Extract each field by its ### heading ───────────────────────
            function extract(heading) {
              // Escape any regex special chars in the heading (e.g. / ? .)
              const escaped = heading.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const regex   = new RegExp(
                `###\\s+${escaped}\\s*\\n([\\s\\S]*?)(?=\\n###|$)`,
                'i'
              );
              const match = body.match(regex);
              if (!match) return '_Not provided_';
              // Strip HTML comments left by placeholder text
              const value = match[1].trim().replace(/<!--[\s\S]*?-->/g, '').trim();
              return value || '_Not provided_';
            }

            const truncate = (str, n = 300) =>
              str.length > n ? str.slice(0, n) + '…' : str;

            const project      = extract('Project');
            const programId    = extract('Program ID');
            const reason       = extract('Upgrade Reason');
            const buildHash    = truncate(extract('Verifiable Build Hash'), 200);
            const commitId     = extract('Commit ID / Branch');
            const auditReports = truncate(extract('Audit Reports'), 400);
            const summary      = truncate(extract('Summary of Changes / Reason for Upgrade'), 600);

            // ── 3. Build the Slack user group mention ──────────────────────────
            const groupId = process.env.SLACK_REVIEW_GROUP_ID;
            const mention = groupId ? `<!subteam^${groupId}>` : '<!here>';

            // ── 4. Assemble the Block Kit payload ──────────────────────────────
            const issue   = context.payload.issue;
            const payload = {
              blocks: [
                {
                  type: 'header',
                  text: { type: 'plain_text', text: '🚀 Program Upgrade Intent', emoji: true }
                },
                {
                  type: 'section',
                  text: {
                    type: 'mrkdwn',
                    text: `${mention} — a new upgrade intent requires your attention.\n\n<${issue.html_url}|*#${issue.number} — ${issue.title}*>\nOpened by *${issue.user.login}*`
                  },
                  accessory: {
                    type: 'button',
                    text: { type: 'plain_text', text: 'View Issue', emoji: true },
                    url: issue.html_url,
                    action_id: 'view_issue'
                  }
                },
                { type: 'divider' },
                {
                  type: 'section',
                  fields: [
                    { type: 'mrkdwn', text: `*📂 Project*\n${project}` },
                    { type: 'mrkdwn', text: `*⚙️ Upgrade Reason*\n${reason}` }
                  ]
                },
                {
                  type: 'section',
                  fields: [
                    { type: 'mrkdwn', text: `*🔑 Program ID*\n\`${programId}\`` },
                    { type: 'mrkdwn', text: `*🔀 Commit ID / Branch*\n\`${commitId}\`` }
                  ]
                },
                {
                  type: 'section',
                  text: {
                    type: 'mrkdwn',
                    text: `*#️⃣ Verifiable Build Hash*\n\`\`\`${buildHash}\`\`\``
                  }
                },
                {
                  type: 'section',
                  text: { type: 'mrkdwn', text: `*📎 Audit Reports*\n${auditReports}` }
                },
                {
                  type: 'section',
                  text: { type: 'mrkdwn', text: `*📋 Summary of Changes*\n${summary}` }
                },
                { type: 'divider' },
                {
                  type: 'context',
                  elements: [
                    {
                      type: 'mrkdwn',
                      text: `📦 Repo: *${context.repo.owner}/${context.repo.repo}*  |  🕐 ${issue.created_at}`
                    }
                  ]
                }
              ]
            };

            core.setOutput('payload', JSON.stringify(payload));

      # ── Send to Slack ─────────────────────────────────────────────────────────
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        with:
          payload: ${{ steps.payload.outputs.payload }}
